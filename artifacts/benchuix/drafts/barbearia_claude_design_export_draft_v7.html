  <script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // No text/babel src scripts are present in this draft bundle, so no
      // network-like fetch path is required to hydrate the sandbox locally.
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

\"{{ true }}\">\n                          <div style=\"{{ day.openBandStyle }}\"></div>\n                        </sc-if>\n\n                        <sc-for list=\"{{ day.events }}\" as=\"event\" hint-placeholder-count=\"1\">\n                          <div style=\"{{ event.cardStyle }}\">\n                            <div style=\"font-size:11px;font-weight:700;color:var(--text-secondary);line-height:1.35\">{{ event.title }}</div>\n                            <div style=\"font-size:10px;color:var(--text-muted);line-height:1.35\">{{ event.subtitle }}</div>\n                          </div>\n                        </sc-for>\n\n                        <sc-for list=\"{{ day.slotButtons }}\" as=\"slot\" hint-placeholder-count=\"5\">\n                          <button onclick=\"{{ slot.onSelect }}\" style=\"{{ slot.shellStyle }}\" style-hover=\"background:var(--accent-blue-soft)\">\n                            <span style=\"font-size:10px;font-weight:700;color:var(--accent-blue)\">{{ slot.label }}</span>\n                            <span style=\"font-size:10px;color:var(--text-tertiary)\">+ bloquear</span>\n                          </button>\n                        </sc-for>\n\n                        <sc-if value=\"{{ day.closedNote }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"{{ day.closedNoteStyle }}\">{{ day.closedNote }}</div>\n                        </sc-if>\n                      </div>\n                    </div>\n                  </sc-for>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"availability-calendar-mobile\">\n            <div class=\"availability-mobile-toolbar\">\n              <div>\n                <div style=\"font-size:11px;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.10em;margin-bottom:4px\">Disponibilidade m\u00f3vel</div>\n                <div style=\"font-size:13px;color:var(--text-tertiary)\">{{ availabilityMobileSummary }}</div>\n              </div>\n              <div style=\"display:flex;align-items:center;gap:6px;flex-wrap:wrap\">\n                <button onclick=\"{{ goAvailabilityPrevious }}\" style=\"padding:7px 14px;background:transparent;border:1px solid var(--border-soft);border-radius:8px;font-size:12px;color:{{ availabilityCanGoPrevious ? 'var(--text-tertiary)' : 'var(--text-subtle)' }};cursor:{{ availabilityCanGoPrevious ? 'pointer' : 'default' }};opacity:{{ availabilityCanGoPrevious ? '1' : '0.45' }}\" style-hover=\"background:var(--bg-surface)\">\u2190 anterior</button>\n                <button onclick=\"{{ goAvailabilityToday }}\" style=\"padding:7px 14px;background:var(--bg-button-subtle);border:1px solid var(--border-soft);border-radius:8px;font-size:12px;font-weight:600;color:var(--text-primary);cursor:pointer\">Hoje</button>\n                <button onclick=\"{{ goAvailabilityNext }}\" style=\"padding:7px 14px;background:transparent;border:1px solid var(--border-soft);border-radius:8px;font-size:12px;color:{{ availabilityCanGoNext ? 'var(--text-tertiary)' : 'var(--text-subtle)' }};cursor:{{ availabilityCanGoNext ? 'pointer' : 'default' }};opacity:{{ availabilityCanGoNext ? '1' : '0.45' }}\" style-hover=\"background:var(--bg-surface)\">pr\u00f3ximo \u2192</button>\n              </div>\n            </div>\n            <div class=\"availability-mobile-day-shell\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px\">\n                <div>\n                  <div style=\"font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.08em\">{{ availabilityMobileDayShort }}</div>\n                  <div style=\"font-size:18px;font-weight:700;color:{{ availabilityMobileDateColor }};margin-top:4px\">{{ availabilityMobileDateLabel }}</div>\n                </div>\n                <span style=\"{{ availabilityMobileStatePillStyle }}\">{{ availabilityMobileStateLabel }}</span>\n              </div>\n              <div style=\"font-size:12px;color:var(--text-tertiary);line-height:1.5;margin-bottom:12px\">{{ availabilityMobileHoursLabel }}</div>\n              <div class=\"availability-mobile-grid\">\n                <div class=\"availability-mobile-hours\">\n                  <sc-for list=\"{{ availabilityHourGuides }}\" as=\"guide\" hint-placeholder-count=\"6\">\n                    <div style=\"{{ guide.railStyle }}\">\n                      <span style=\"{{ guide.labelStyle }}\">{{ guide.label }}</span>\n                    </div>\n                  </sc-for>\n                </div>\n                <div class=\"availability-mobile-canvas\">\n                  <div style=\"position:absolute;left:0;right:0;top:0;bottom:0\">\n                    <sc-for list=\"{{ availabilityHourGuides }}\" as=\"guide\" hint-placeholder-count=\"6\">\n                      <div style=\"{{ guide.lineStyle }}\"></div>\n                    </sc-for>\n                  </div>\n                  <div class=\"availability-mobile-column\">\n                    <sc-if value=\"{{ availabilityMobileHasOpenBand }}\" hint-placeholder-val=\"{{ true }}\">\n                      <div style=\"{{ availabilityMobileOpenBandStyle }}\"></div>\n                    </sc-if>\n                    <sc-for list=\"{{ availabilityMobileEvents }}\" as=\"event\" hint-placeholder-count=\"1\">\n                      <div style=\"{{ event.cardStyle }}\">\n                        <div style=\"font-size:11px;font-weight:700;color:var(--text-secondary);line-height:1.35\">{{ event.title }}</div>\n                        <div style=\"font-size:10px;color:var(--text-muted);line-height:1.35\">{{ event.subtitle }}</div>\n                      </div>\n                    </sc-for>\n                    <sc-for list=\"{{ availabilityMobileSlotButtons }}\" as=\"slot\" hint-placeholder-count=\"5\">\n                      <button onclick=\"{{ slot.onSelect }}\" style=\"{{ slot.shellStyle }}\" style-hover=\"background:var(--accent-blue-soft)\">\n                        <span style=\"font-size:10px;font-weight:700;color:var(--accent-blue)\">{{ slot.label }}</span>\n                        <span style=\"font-size:10px;color:var(--text-tertiary)\">+ bloquear</span>\n                      </button>\n                    </sc-for>\n                    <sc-if value=\"{{ availabilityMobileClosedNote }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"{{ availabilityMobileClosedNoteStyle }}\">{{ availabilityMobileClosedNote }}</div>\n                    </sc-if>\n                  </div>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"availability-blocks-table-desktop\" style=\"background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:16px;overflow:hidden\">\n            <div style=\"padding:15px 22px 13px;border-bottom:1px solid var(--border-hairline)\">\n              <span style=\"font-size:13px;font-weight:700;color:var(--text-primary)\">Bloqueios e regras ativas</span>\n            </div>\n            <div style=\"display:grid;grid-template-columns:120px 1fr 130px 120px;align-items:center;padding:9px 22px;border-bottom:1px solid var(--border-ghost)\">\n              <span style=\"font-size:10px;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.07em\">Data/Hor\u00e1rio</span>\n              <span style=\"font-size:10px;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.07em\">Motivo</span>\n              <span style=\"font-size:10px;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.07em\">Tipo</span>\n              <span></span>\n            </div>\n            <sc-for list=\"{{ blockRows }}\" as=\"block\" hint-placeholder-count=\"4\">\n              <div style=\"display:grid;grid-template-columns:120px 1fr 130px 120px;align-items:center;padding:13px 22px;border-bottom:{{ block.borderStyle }}\">\n                <div><div style=\"font-size:12px;font-weight:600;color:var(--text-primary)\">{{ block.dayLabel }}</div><div style=\"font-size:11px;color:var(--text-subtle)\">{{ block.timeLabel }}</div></div>\n                <span style=\"font-size:13px;color:var(--text-secondary)\">{{ block.reason }}</span>\n                <span style=\"{{ block.kindStyle }}\">{{ block.kind }}</span>\n                <div style=\"display:flex;gap:6px\"><button onclick=\"{{ block.editHandler }}\" style=\"padding:5px 10px;background:transparent;border:1px solid var(--border-strong);border-radius:7px;font-size:11px;color:var(--text-muted);cursor:pointer\" style-hover=\"background:var(--bg-hover)\">Editar</button><button onclick=\"{{ block.removeHandler }}\" style=\"padding:5px 10px;background:transparent;border:1px solid var(--border-soft);border-radius:7px;font-size:11px;color:var(--text-tertiary);cursor:pointer\" style-hover=\"color:var(--text-muted)\">Remover</button></div>\n              </div>\n            </sc-for>\n          </div>\n          <div class=\"availability-block-cards-mobile\">\n            <sc-for list=\"{{ blockRows }}\" as=\"block\" hint-placeholder-count=\"4\">\n              <div class=\"availability-block-card\">\n                <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px\">\n                  <div>\n                    <div style=\"font-size:14px;font-weight:700;color:var(--text-primary)\">{{ block.dayLabel }}</div>\n                    <div style=\"font-size:12px;color:var(--text-tertiary);margin-top:3px\">{{ block.timeLabel }}</div>\n                  </div>\n                  <span style=\"{{ block.kindStyle }}\">{{ block.kind }}</span>\n                </div>\n                <div style=\"font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:12px\">{{ block.reason }}</div>\n                <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n                  <button onclick=\"{{ block.editHandler }}\" style=\"padding:8px 12px;background:transparent;border:1px solid var(--border-strong);border-radius:9px;font-size:12px;color:var(--text-muted);cursor:pointer\" style-hover=\"background:var(--bg-hover)\">Editar</button>\n                  <button onclick=\"{{ block.removeHandler }}\" style=\"padding:8px 12px;background:transparent;border:1px solid var(--border-soft);border-radius:9px;font-size:12px;color:var(--text-tertiary);cursor:pointer\" style-hover=\"background:var(--bg-hover)\">Remover</button>\n                </div>\n              </div>\n            </sc-for>\n          </div>\n        </div>\n      </sc-if>\n      <!-- \u2550\u2550 APROVA\u00c7\u00d5ES \u2550\u2550 -->\n      <sc-if value=\"{{ isAprovacoes }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"margin-bottom:18px\"><div style=\"font-size:13px;color:var(--text-tertiary)\">Exce\u00e7\u00f5es que precisam da sua autoriza\u00e7\u00e3o para prosseguir</div></div>\n          <sc-if value=\"{{ hasApprovals }}\" hint-placeholder-val=\"{{ true }}\">\n            <sc-for list=\"{{ approvalsView }}\" as=\"approval\" hint-placeholder-count=\"1\">\n              <div style=\"background:var(--bg-surface);border:1px solid var(--accent-warning-soft);border-radius:12px;padding:20px 22px;margin-bottom:12px\">\n                <div class=\"approval-row\" style=\"display:flex;align-items:flex-start;gap:16px\">\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px\">\n                      <span style=\"font-size:15px;font-weight:700;color:var(--text-primary)\">{{ approval.clientName }}</span>\n                      <span style=\"font-size:13px;color:var(--text-tertiary)\">\u00b7 {{ approval.service }} \u00b7 {{ approval.requestedSlot }}</span>\n                      <span style=\"{{ approval.badgeStyle }}\">{{ approval.badgeText }}</span>\n                    </div>\n                    <div style=\"font-size:12px;color:var(--text-tertiary);margin-bottom:12px\">{{ approval.channel }} \u00b7 {{ approval.statusContext }}</div>\n                    <div style=\"background:var(--bg-hover);border-radius:8px;padding:12px 14px;margin-bottom:12px\">\n                      <div style=\"font-size:11px;font-weight:600;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px\">Por que precisa de voc\u00ea</div>\n                      <div style=\"font-size:13px;color:var(--text-primary)\">{{ approval.reason }}</div>\n                    </div>\n                    <div style=\"background:var(--bg-hover);border-radius:8px;padding:12px 14px;margin-bottom:12px\">\n                      <div style=\"font-size:11px;font-weight:600;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px\">O que j\u00e1 foi tentado</div>\n                      <div style=\"font-size:13px;color:var(--text-primary)\">{{ approval.attemptedAlternatives }}</div>\n                    </div>\n                    <div style=\"font-size:12px;color:var(--text-tertiary)\"><span style=\"color:var(--text-primary);font-weight:500\">Pr\u00f3ximo passo:</span> {{ approval.nextStepText }}</div>\n                  </div>\n                  <button onclick=\"{{ approval.openHandler }}\" class=\"approval-action\" style=\"padding:9px 18px;background:var(--accent-blue);border:none;border-radius:7px;font-size:13px;font-weight:600;color:var(--text-on-accent);cursor:pointer;flex-shrink:0\" style-hover=\"background:var(--accent-blue-strong)\">Decidir \u2192</button>\n                </div>\n              </div>\n            </sc-for>\n          </sc-if>\n          <sc-if value=\"{{ noApprovals }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:14px 18px;background:var(--bg-surface);border:1px dashed var(--border-soft);border-radius:10px;text-align:center\">\n              <div style=\"font-size:12px;color:var(--text-subtle)\">Nenhuma exce\u00e7\u00e3o aguarda autoriza\u00e7\u00e3o no momento.</div>\n            </div>\n          </sc-if>\n        </div>\n      </sc-if>\n\n      <!-- \u2550\u2550 ESTIMATIVA \u2550\u2550 -->\n      <sc-if value=\"{{ isEstimativa }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"margin-bottom:16px;padding:11px 14px;background:var(--bg-surface-strong);border:1px solid var(--border-subtle);border-radius:11px;font-size:12px;color:var(--text-tertiary)\">visual sint\u00e9tico \u00b7 sem cobran\u00e7a \u00b7 sem nota fiscal \u00b7 sem PSP \u00b7 sem caixa real</div>\n\n          <div class=\"estimate-layout-grid\" style=\"display:grid;grid-template-columns:minmax(0,1.35fr) 320px;gap:14px;margin-bottom:18px\">\n            <div style=\"background:linear-gradient(180deg,var(--bg-hero-start) 0%,var(--bg-hero-end) 100%);border:1px solid var(--border-subtle);border-radius:18px;padding:24px 24px 22px;min-height:220px;display:flex;flex-direction:column;justify-content:space-between\">\n              <div>\n                <div style=\"font-size:10px;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px\">N\u00famero dominante</div>\n                <div style=\"font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:12px\">Confirmado</div>\n                <div style=\"font-size:52px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums;line-height:0.94;margin-bottom:12px\">{{ dayEstimateLabel }}</div>\n                <div style=\"font-size:13px;color:var(--text-tertiary);line-height:1.6\">{{ appointmentsCount }} agendamentos confirmados comp\u00f5em este total derivado do array sint\u00e9tico da agenda.</div>\n              </div>\n              <div style=\"display:flex;align-items:center;gap:10px;margin-top:20px\">\n                <div style=\"padding:5px 9px;background:var(--bg-chip);border:1px solid var(--border-soft);border-radius:999px;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em\">sem cobran\u00e7a real</div>\n                <div style=\"font-size:11px;color:var(--text-subtle)\">Somente leitura visual para revis\u00e3o do operador.</div>\n              </div>\n            </div>\n\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <sc-for list=\"{{ estimateSecondaryMetrics }}\" as=\"metric\" hint-placeholder-count=\"2\">\n                <div style=\"background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:16px;padding:18px 18px 16px\">\n                  <div style=\"font-size:10px;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:10px\">{{ metric.label }}</div>\n                  <div style=\"font-size:30px;font-weight:700;color:var(--text-secondary);font-variant-numeric:tabular-nums;line-height:1;margin-bottom:8px\">{{ metric.value }}</div>\n                  <div style=\"font-size:12px;color:var(--text-tertiary);line-height:1.5\">{{ metric.note }}</div>\n                </div>\n              </sc-for>\n            </div>\n          </div>\n\n          <div style=\"background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:14px;padding:16px 18px;font-size:12px;color:var(--text-tertiary);line-height:1.7\">{{ estimateSourceHintLong }}</div>\n        </div>\n      </sc-if>\n      <!-- \u2550\u2550 CONFIGURA\u00c7\u00d5ES \u2550\u2550 -->\n      <sc-if value=\"{{ isConfiguracoes }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:flex;align-items:flex-start;gap:14px;padding:14px 16px;background:var(--accent-blue-soft);border:1px solid var(--accent-blue-border);border-radius:14px;margin-bottom:18px\">\n            <div style=\"display:flex;align-items:center;gap:8px;flex-shrink:0\">\n              <div style=\"width:8px;height:8px;border-radius:50%;background:var(--accent-blue)\"></div>\n              <span style=\"font-family:'Caveat',cursive;font-size:16px;font-weight:600;color:var(--accent-blue)\">sandbox sint\u00e9tico</span>\n            </div>\n            <div style=\"flex:1;font-size:13px;color:var(--text-secondary);line-height:1.6\">Nenhuma altera\u00e7\u00e3o aqui toca sistema real. Esta tela prepara prefer\u00eancias locais e a base estrutural do tema claro para as pr\u00f3ximas rodadas.</div>\n          </div>\n\n          <div class=\"settings-layout-grid\" style=\"display:grid;grid-template-columns:minmax(0,1.05fr) minmax(320px,0.95fr);gap:16px;align-items:start\">\n            <div style=\"display:flex;flex-direction:column;gap:16px\">\n              <div style=\"background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:18px;padding:20px 20px 18px\">\n                <div style=\"font-size:10px;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.10em;margin-bottom:12px\">Dados do neg\u00f3cio</div>\n                <div style=\"display:grid;grid-template-columns:1fr;gap:12px\">\n                  <label style=\"display:flex;flex-direction:column;gap:6px;font-size:11px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.07em\">Nome\n                    <input value=\"{{ businessProfile.name }}\" oninput=\"{{ onBusinessNameChange }}\" style=\"padding:11px 12px;background:var(--bg-shell);border:1px solid var(--border-soft);border-radius:10px;color:var(--text-primary);font-size:13px\" placeholder=\"Nome sint\u00e9tico do neg\u00f3cio\">\n                  </label>\n                  <label style=\"display:flex;flex-direction:column;gap:6px;font-size:11px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.07em\">Endere\u00e7o\n                    <input value=\"{{ businessProfile.address }}\" oninput=\"{{ onBusinessAddressChange }}\" style=\"padding:11px 12px;background:var(--bg-shell);border:1px solid var(--border-soft);border-radius:10px;color:var(--text-primary);font-size:13px\" placeholder=\"Endere\u00e7o sint\u00e9tico\">\n                  </label>\n                  <label style=\"display:flex;flex-direction:column;gap:6px;font-size:11px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.07em\">Telefone\n                    <input value=\"{{ businessProfile.phone }}\" oninput=\"{{ onBusinessPhoneChange }}\" style=\"padding:11px 12px;background:var(--bg-shell);border:1px solid var(--border-soft);border-radius:10px;color:var(--text-primary);font-size:13px\" placeholder=\"Telefone sint\u00e9tico\">\n                  </label>\n                </div>\n              </div>\n\n              <div style=\"background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:18px;padding:20px 20px 18px\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\">\n                  <div style=\"font-size:10px;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.10em\">Hor\u00e1rio de funcionamento</div>\n                  <div style=\"flex:1\"></div>\n                  <div style=\"font-size:11px;color:var(--text-tertiary)\">mesma base sint\u00e9tica da Disponibilidade</div>\n                </div>\n                <div style=\"display:flex;flex-direction:column;gap:10px\">\n                  <sc-for list=\"{{ settingsHours }}\" as=\"day\" hint-placeholder-count=\"7\">\n                    <div class=\"settings-hours-row\" style=\"display:grid;grid-template-columns:120px 110px 110px 1fr 110px;gap:10px;align-items:center;padding:12px 12px;background:var(--bg-surface-muted);border:1px solid var(--border-hairline);border-radius:12px\">\n                      <div>\n                        <div style=\"font-size:13px;font-weight:700;color:var(--text-primary)\">{{ day.dayLabel }}</div>\n m:12px\">O mesmo sistema de vari\u00e1veis alimenta as demais telas; futuras rodadas s\u00f3 precisam herdar este tema, n\u00e3o reimplementar cor por tela.</div>\n                  <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n                    <button onclick=\"{{ setThemeDark }}\" style=\"padding:9px 14px;background:{{ theme === 'dark' ? 'var(--accent-blue)' : 'var(--bg-chip)' }};border:1px solid {{ theme === 'dark' ? 'var(--accent-blue)' : 'var(--border-soft)' }};border-radius:999px;font-size:12px;font-weight:700;color:{{ theme === 'dark' ? 'var(--text-on-accent)' : 'var(--text-muted)' }};cursor:pointer\" style-hover=\"background:var(--bg-hover)\">Escuro</button>\n                    <button onclick=\"{{ setThemeLight }}\" style=\"padding:9px 14px;background:{{ theme === 'light' ? 'var(--accent-blue)' : 'var(--bg-chip)' }};border:1px solid {{ theme === 'light' ? 'var(--accent-blue)' : 'var(--border-soft)' }};border-radius:999px;font-size:12px;font-weight:700;color:{{ theme === 'light' ? 'var(--text-on-accent)' : 'var(--text-muted)' }};cursor:pointer\" style-hover=\"background:var(--bg-hover)\">Claro</button>\n                    <button onclick=\"{{ toggleTheme }}\" style=\"padding:9px 14px;background:transparent;border:1px solid var(--border-strong);border-radius:999px;font-size:12px;font-weight:600;color:var(--text-tertiary);cursor:pointer\" style-hover=\"background:var(--bg-hover)\">Alternar r\u00e1pido \u00b7 {{ themeToggleGlyph }}</button>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:18px;padding:20px 20px 18px\">\n                <div style=\"font-size:10px;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.10em;margin-bottom:12px\">Resumo da sess\u00e3o</div>\n                <div style=\"display:flex;flex-direction:column;gap:10px\">\n                  <div style=\"padding:12px ep.index }}</span><span style=\"font-size:13px;color:var(--text-primary)\">{{ step.text }}</span></div>\n              </sc-for>\n            </div>\n          </div>\n          <div style=\"background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:12px;padding:20px 24px;margin-bottom:12px\">\n            <div style=\"font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:14px\">Quando o sistema pede sua decis\u00e3o</div>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{ helpEscalations }}\" as=\"item\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:10px\"><span style=\"color:var(--text-tertiary);flex-shrink:0\">\u2192</span><span style=\"font-size:13px;color:var(--text-primary)\">{{ item }}</span></div>\n              </sc-for>\n            </div>\n          </div>\n          <div style=\"background:var(--accent-blue-soft);border:1px solid var(--accent-blue-border);border-radius:12px;padding:16px 20px\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px\"><div style=\"width:6px;height:6px;border-radius:50%;background:var(--accent-blue)\"></div><span style=\"font-family:'Caveat',cursive;font-size:15px;font-weight:600;color:var(--accent-blue)\">sandbox sint\u00e9tico</span></div>\n            <div style=\"font-size:13px;color:var(--text-tertiary);line-height:1.6\">Ambiente de demonstra\u00e7\u00e3o. Nenhum cliente \u00e9 contatado, nenhum agendamento \u00e9 gravado em sistema real, nenhum dinheiro \u00e9 movimentado.</div>\n          </div>\n        </div>\n      </sc-if>\n\n      <!-- \u2550\u2550 PLACEHOLDER \u2550\u2550 -->\n      <sc-if value=\"{{ isPlaceholder }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;gap:12px\">\n          <div style=\"width:48px;height:48px;border-radius:12px;background:var(--bg-surface);border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><rect x=\"3\" y=\"3\" width=\"14\" height=\"14\" rx=\"3\" stroke=\"var(--text-subtle)\" stroke-width=\"1.5\"></rect><path d=\"M7 10h6M10 7v6\" stroke=\"var(--text-subtle)\" stroke-width=\"1.5\" stroke-linecap=\"round\"></path></svg>\n          </div>\n          <div style=\"font-size:15px;font-weight:600;color:var(--text-tertiary)\">{{ screenTitle }}</div>\n          <div style=\"font-size:13px;color:var(--text-subtle)\">em constru\u00e7\u00e3o \u00b7 dispon\u00edvel em breve</div>\n        </div>\n      </sc-if>\n\n    <div onclick=\"{{ closeAny }}\" style=\"position:fixed;inset:0;background:var(--overlay-backdrop);z-index:40;transition:opacity 200ms;opacity:{{ overlayOp }};pointer-events:{{ overlayPE }}\"></div></div>\n\n    <!-- CONTENT -->\n    \n  </div>\n</div>\n\n<!-- OVERLAY -->\n\n\n<!-- DRAWER: exce\u00e7\u00e3o / aprova\u00e7\u00e3o -->\n<div class=\"drawer-shell\" style=\"position:fixed;top:0;right:0;height:100vh;width:440px;background:var(--bg-shell);border-left:1px solid var(--border-soft);z-index:50;display:flex;flex-direction:column;transform:{{ drawerT }};transition:transform 240ms cubic-bezier(0.32,0.72,0,1)\">\n  <div style=\"padding:20px 22px 16px;border-bottom:1px solid var(--border-subtle);flex-shrink:0\">\n    <div style=\"display:flex;align-items:flex-start;gap:10px\">\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:4px\">{{ selectedApproval.clientName }} \u2014 {{ selectedApproval.service }}</div>\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\"><span style=\"font-size:12px;color:var(--text-tertiary)\">{{ selectedApproval.requestedSlot }}</span><span style=\"color:var(--text-subtle)\">\u00b7</span><span style=\"font-size:12px;color:var(--text-tertiary)\">{{ se e.text }}</div>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n    <div style=\"padding:13px 15px;background:var(--bg-surface);border-radius:9px;margin-bottom:12px\">\n      <div style=\"font-size:11px;font-weight:600;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px\">Se voc\u00ea autorizar a exce\u00e7\u00e3o</div>\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <sc-for list=\"{{ selectedApproval.authorizationEffects }}\" as=\"effect\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;gap:8px;font-size:13px;color:var(--text-primary)\"><span style=\"color:var(--accent-blue);font-weight:700;flex-shrink:0\">\u2192</span>{{ effect }}</div>\n        </sc-for>\n      </div>\n    </div>\n    <div style=\"padding:13px 15px;background:var(--bg-surface);border-radius:9px;margin-bottom:12px\">\n      <div style=\"font-size:11px;font-weight:600;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px\">Pr\u00f3ximo passo</div>\n      <div style=\"font-size:13px;color:var(--text-primary)\">{{ selectedApproval.nextStepText }}</div>\n    </div>\n    <div style=\"padding:13px 16px;background:var(--accent-blue-soft);border:1px solid var(--accent-blue-border-soft);border-radius:9px;display:flex;align-items:center;gap:10px\">\n      <div style=\"width:8px;height:8px;border-radius:50%;background:var(--accent-blue);flex-shrink:0\"></div>\n      <div><div style=\"font-size:11px;font-weight:600;color:var(--accent-blue);text-transform:uppercase;letter-spacing:0.08em\">Estado real</div><div style=\"font-size:13px;color:var(--text-primary);margin-top:2px;display:flex;align-items:center;gap:6px\"><strong>n\u00e3o tocado</strong><span style=\"font-family:'Caveat',cursive;font-size:14px;color:var(--accent-blue-soft-text)\">nada real foi tocado</span></div></div>\n    </div>\n  </div>\n  <div style=\"padding:16px 22px;border-top:1px solid var(--border-subtle);fl
