document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

out infinite;\">\n          <path d=\"M27 5 L45 14 L45 28 C45 40 27 49 27 49 C27 49 9 40 9 28 L9 14 Z\" stroke=\"#6fa8e8\" strokewidth=\"1.6\" strokelinejoin=\"round\"><\u002Fpath>\n          <path d=\"M19 27 L25 33 L36 21\" stroke=\"#6fa8e8\" strokewidth=\"1.8\" strokelinecap=\"round\" strokelinejoin=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <div data-anim-text=\"\" style=\"display:flex; flexDirection:column; alignItems:center;\">\n        <p style=\"fontFamily:'Lora',serif; fontWeight:400; fontStyle:italic; fontSize:clamp(14px,3.8vw,16px); color:#7e90a8; letterSpacing:0.03em; margin:0 0 56px;\">Automação com segurança, do jeito certo.<\u002Fp>\n        <button onclick=\"{{ handleEntrar }}\" style=\"width:clamp(240px,80vw,320px); height:56px; background:{{ entrarBg }}; border:none; borderRadius:12px; fontFamily:'DM Sans',sans-serif; fontWeight:500; fontSize:16px; color:#e8eaf0; cursor:pointer; letterSpacing:0.03em; transition:background 0.2s ease, transform 0.15s ease;\" style-hover=\"background:#1f5bb5;\" style-active=\"background:#112f62; transform:scale(0.972);\">{{ comecarlabel }}<\u002Fbutton>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══════════════════════════════════════════════════\n       NAV OVERLAY\n  ═══════════════════════════════════════════════════ -->\n\n  <!-- Pular -->\n  <sc-if value=\"{{ showSkip }}\" hint-placeholder-val=\"{{ true }}\">\n    <button onclick=\"{{ skip }}\" style=\"position:absolute; top:clamp(44px,7vh,60px); right:20px; background:none; border:none; fontFamily:'DM Sans',sans-serif; fontWeight:400; fontSize:14px; color:rgba(255,255,255,0.24); cursor:pointer; padding:10px 8px; zIndex:40; transition:color 0.3s ease;\" style-hover=\"color:rgba(255,255,255,0.72);\">pular<\u002Fbutton>\n  <\u002Fsc-if>\n\n  <!-- Prev arrow — minimal, strong white -->\n  <sc-if value=\"{{ showPrev }}\" hint-placeholder-val=\"{{ false }}\">\n    <button onclick=\"{{ goPrev }}\" style=\"position:absolute; left:16px; top:50%; transform:translateY(-50%); width:44px; height:44px; background:none; border:none; cursor:pointer; zIndex:40; color:#e8eaf0; display:flex; alignItems:center; justifyContent:center; transition:color 0.25s ease;\" style-hover=\"color:#ffffff;\" style-active=\"color:#d4d8e0;\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\">\n        <path d=\"M12 4 L6 10 L12 16\" stroke=\"currentColor\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fsc-if>\n\n  <!-- Next arrow — minimal, strong white -->\n  <sc-if value=\"{{ showNext }}\" hint-placeholder-val=\"{{ false }}\">\n    <button onclick=\"{{ goNext }}\" style=\"position:absolute; right:16px; top:50%; transform:translateY(-50%); width:44px; height:44px; background:none; border:none; cursor:pointer; zIndex:40; color:#e8eaf0; display:flex; alignItems:center; justifyContent:center; transition:color 0.25s ease;\" style-hover=\"color:#ffffff;\" style-active=\"color:#d4d8e0;\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\">\n        <path d=\"M8 4 L14 10 L8 16\" stroke=\"currentColor\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fsc-if>\n\n  <!-- Progress dots — pill for active, circle for inactive -->\n  <div style=\"position:absolute; bottom:clamp(28px,5vh,52px); left:0; right:0; display:flex; gap:8px; justifyContent:center; alignItems:center; zIndex:40;\">\n    <button onclick=\"{{ goTo0 }}\" style=\"background:none; border:none; cursor:pointer; padding:12px 4px; display:flex; alignItems:center; justifyContent:center;\">\n      <div style=\"height:5px; width:{{ d0w }}; background:{{ d0c }}; borderRadius:3px; transition:width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s ease;\"><\u002Fdiv>\n    <\u002Fbutton>\n    <button onclick=\"{{ goTo1 }}\" style=\"background:none; border:none; cursor:pointer; padding:12px 4px; display:flex; alignItems:center; justifyContent:center;\">\n      <div style=\"height:5px; width:{{ d1w }}; background:{{ d1c }}; borderRadius:3px; transition:width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s ease;\"><\u002Fdiv>\n    <\u002Fbutton>\n    <button onclick=\"{{ goTo2 }}\" style=\"background:none; border:none; cursor:pointer; padding:12px 4px; display:flex; alignItems:center; justifyContent:center;\">\n      <div style=\"height:5px; width:{{ d2w }}; background:{{ d2c }}; borderRadius:3px; transition:width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s ease;\"><\u002Fdiv>\n    <\u002Fbutton>\n    <button onclick=\"{{ goTo3 }}\" style=\"background:none; border:none; cursor:pointer; padding:12px 4px; display:flex; alignItems:center; justifyContent:center;\">\n      <div style=\"height:5px; width:{{ d3w }}; background:{{ d3c }}; borderRadius:3px; transition:width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s ease;\"><\u002Fdiv>\n    <\u002Fbutton>\n    <button onclick=\"{{ goTo4 }}\" style=\"background:none; border:none; cursor:pointer; padding:12px 4px; display:flex; alignItems:center; justifyContent:center;\">\n      <div style=\"height:5px; width:{{ d4w }}; background:{{ d4c }}; borderRadius:3px; transition:width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s ease;\"><\u002Fdiv>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { currentScreen: 0, taglineVisible: false, animDone: false, entered: false };\n\n  canvasRef    = React.createRef();\n  containerRef = React.createRef();\n\n  _transitioning  = false;\n  _particlesDone  = false;\n  _rafId          = null;\n  _touchStartX    = 0;\n  _touchStartY    = 0;\n  _cleanupFns     = [];\n\n  // ─────────────────────────────────────────────────────────\n  // Lifecycle\n  // ─────────────────────────────────────────────────────────\n\n  componentDidMount() {\n    this._initScreens();\n    this._initCanvas();\n    this._initTouch();\n\n    const onKey = (e) => {\n      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') this.navigate(1);\n      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   this.navigate(-1);\n    };\n    window.addEventListener('keydown', onKey);\n    this._cleanupFns.push(() => window.removeEventListener('keydown', onKey));\n  }\n\n  componentWillUnmount() {\n    if (this._rafId) cancelAnimationFrame(this._rafId);\n    this._cleanupFns.forEach(fn => fn());\n  }\n\n  // ─────────────────────────────────────────────────────────\n  // Screen init\n  // ─────────────────────────────────────────────────────────\n\n  _initScreens() {\n    const c = this.containerRef.current;\n    if (!c) return;\n    c.querySelectorAll('[data-screen]').forEach((s, i) => {\n      s.style.transform    = 'translateX(0)';\n      s.style.opacity      = i === 0 ? '1' : '0';\n      s.style.pointerEvents = i === 0 ? 'auto' : 'none';\n      if (i > 0) s.style.transform = 'translateX(24px)';\n    });\n  }\n\n  // ─────────────────────────────────────────────────────────\n  // Navigation\n  // ─────────────────────────────────────────────────────────\n\n  navigate(dir) {\n    if (this.state.currentScreen === 0 && !this._particlesDone) this._finishAnim();\n    const { currentScreen } = this.state;\n    const next = currentScreen + dir;\n    if (next < 0 || next > 4 || this._transitioning) return;\n    this._doTransition(currentScreen, next, dir > 0 ? 1 : -1);\n  }\n\n  jumpTo(idx) {\n    if (this._transitioning) return;\n    const { currentScreen } = this.state;\n    if (idx === currentScreen) return;\n    if (currentScreen === 0 && !this._particlesDone && idx > 0) this._finishAnim();\n    this._doTransition(currentScreen, idx, idx > currentScreen ? 1 : -1);\n  }\n\n  _doTransition(from, to, dir) {\n    this._transitioning = true;\n    this.setState({ currentScreen: to });\n\n    const c   = this.containerRef.current;\n    const all = [...c.querySelectorAll('[data-screen]')];\n    const out = all[from];\n    const inn = all[to];\n\n    // Park off-screen\n    all.forEach((s, i) => {\n      if (i !== from && i !== to) {\n        s.style.transition    = 'none';\n        s.style.opacity       = '0';\n        s.style.transform     = `translateX(${i < from ? '-24px' : '24px'})`;\n        s.style.pointerEvents = 'none';\n      }\n    });\n\n    // Reset outgoing stagger elements so they don't hold stale transforms\n    this._resetStagger(out);\n\n    // Place incoming off-screen\n    inn.style.transition  = 'none';\n    inn.style.opacity     = '0';\n    inn.style.transform   = `translateX(${dir > 0 ? '24px' : '-24px'})`;\n    inn.style.pointerEvents = 'none';\n\n    void inn.getBoundingClientRect(); // flush\n\n    const DUR  = 460;\n    const EASE = 'cubic-bezier(0.22, 1, 0.36, 1)';\n    const FADE = 'cubic-bezier(0.4, 0, 0.2, 1)';\n\n    // Slide out\n    out.style.transition = `transform ${DUR}ms ${EASE}, opacity ${Math.round(DUR * 0.55)}ms ${FADE}`;\n    out.style.transform  = `translateX(${dir > 0 ? '-24px' : '24px'})`;\n    out.style.opacity    = '0';\n\n    // Slide in\n    inn.style.transition = `transform ${DUR}ms ${EASE}, opacity ${Math.round(DUR * 0.65)}ms ${FADE}`;\n    inn.style.transform  = 'translateX(0)';\n    inn.style.opacity    = '1';\n\n    // Stagger icon → text\n    this._triggerStagger(inn);\n\n    setTimeout(() => {\n      out.style.transition    = 'none';\n      out.style.pointerEvents = 'none';\n      inn.style.pointerEvents = 'auto';\n      this._transitioning     = false;\n    }, DUR + 80);\n  }\n\n  // ─────────────────────────────────────────────────────────\n  // Stagger helpers\n  // ─────────────────────────────────────────────────────────\n\n  _resetStagger(screen) {\n    const icon = screen.querySelector('[data-anim-icon]');\n    const text = screen.querySelector('[data-anim-text]');\n    if (icon) { icon.style.transition = 'none'; icon.style.transform = ''; icon.style.opacity = ''; }\n    if (text) { text.style.transition = 'none'; text.style.transform = ''; text.style.opacity = ''; }\n  }\n\n  _triggerStagger(screen) {\n    const icon = screen.querySelector('[data-anim-icon]');\n    const text = screen.querySelector('[data-anim-text]');\n    const EASE = 'cubic-bezier(0.22, 1, 0.36, 1)';\n\n    const animEl = (el, delay) => {\n      if (!el) return;\n      el.style.transition = 'none';\n      el.style.transform  = 'translateY(18px)';\n      void el.getBoundingClientRect();\n      const run = () => {\n        el.style.transition = `transform 0.52s ${EASE}`;\n        el.style.transform  = 'translateY(0)';\n      };\n      delay ? setTimeout(run, delay) : run();\n    };\n\n    animEl(icon, 0);\n    animEl(text, 96);\n  }\n\n  // ─────────────────────────────────────────────────────────\n  // Touch\n  // ─────────────────────────────────────────────────────────\n\n  _initTouch() {\n    const c = this.containerRef.current;\n    if (!c) return;\n    const onStart = (e) => {\n      this._touchStartX = e.touches[0].clientX;\n      this._touchStartY = e.touches[0].clientY;\n    };\n    const onEnd = (e) => {\n      const dx = e.changedTouches[0].clientX - this._touchStartX;\n      const dy = Math.abs(e.changedTouches[0].clientY - this._touchStartY);\n      if (Math.abs(dx) > 40 && dy < 80) this.navigate(dx < 0 ? 1 : -1);\n    };\n    c.addEventListener('touchstart', onStart, { passive: true });\n    c.addEventListener('touchend',   onEnd,   { passive: true });\n    this._cleanupFns.push(() => {\n      c.removeEventListener('touchstart', onStart);\n      c.removeEventListener('touchend',   onEnd);\n    });\n  }\n\n  // ─────────────────────────────────────────────────────────\n  // Canvas / Particles\n  // ─────────────────────────────────────────────────────────\n\n  _initCanvas() {\n    const tryStart = () => {\n      const canvas = this.canvasRef.current;\n      if (!canvas) { setTimeout(tryStart, 100); return; }\n\n      // Measure actual rendered size after layout\n      setTimeout(() => {\n        const r = canvas.getBoundingClientRect();\n        const W = Math.round(r.width)  || window.innerWidth;\n        const H = Math.round(r.height) || window.innerHeight;\n        canvas.width  = W;\n        canvas.height = H;\n\n        canvas.addEventListener('click', () => {\n          if (this._particlesDone) this.navigate(1);\n        });\n\n        const run = () => this._runParticles(W, H);\n        (document.fonts && document.fonts.ready)\n          ? document.fonts.ready.then(run)\n          : setTimeout(run, 700);\n      }, 80);\n    };\n    tryStart();\n  }\n\n  _finishAnim() {\n    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }\n    const canvas = this.canvasRef.current;\n    if (canvas) {\n      const W = canvas.width, H = canvas.height;\n      const ctx = canvas.getContext('2d');\n      const fs  = this._fontSize(W);\n      ctx.clearRect(0, 0, W, H);\n      ctx.globalAlpha = 1;\n      ctx.fillStyle   = '#e8eaf0';\n      ctx.font        = `700 ${fs}px Charm`;\n      ctx.textAlign   = 'center';\n      ctx.textBaseline = 'middle';\n      ctx.fillText('ARIS', W / 2, H / 2);\n    }\n    this._particlesDone = true;\n    this.setState({ animDone: true, taglineVisible: true });\n  }\n\n  _fontSize(W) {\n    return Math.min(Math.max(Math.round(W * 0.22), 72), 108);\n  }\n\n  _runParticles(W, H) {\n    const canvas = this.canvasRef.current;\n    if (!canvas) return;\n    const ctx  = canvas.getContext('2d');\n    const CX   = W / 2;\n    const CY   = H / 2;\n    const FS   = this._fontSize(W);\n\n    // Sample letter pixels from an offscreen canvas\n    const off  = document.createElement('canvas');\n    off.width  = W; off.height = H;\n    const oc   = off.getContext('2d');\n    oc.fillStyle = '#fff';\n    oc.font      = `700 ${FS}px Charm`;\n    oc.textAlign = 'center';\n    oc.textBaseline = 'middle';\n    oc.fillText('ARIS', CX, CY);\n\n    const { data } = oc.getImageData(0, 0, W, H);\n    const targets  = [];\n    const STEP     = Math.max(4, Math.round(W / 88));\n\n    for (let y = 0; y < H; y += STEP) {\n      for (let x = 0; x < W; x += STEP) {\n        if (data[(y * W + x) * 4 + 3] > 100) {\n          targets.push({ x: x + STEP / 2, y: y + STEP / 2 });\n        }\n      }\n    }\n\n    if (!targets.length) { setTimeout(() => this._runParticles(W, H), 300); return; }\n\n    // Shuffle so particles don't converge in raster order\n    for (let i = targets.length - 1; i > 0; i--) {\n      const j = Math.floor(Math.random() * (i + 1));\n      [targets[i], targets[j]] = [targets[j], targets[i]];\n    }\n\n    const SPREAD = Math.min(W, H) * 0.55;\n    const particles = targets.map(t => {\n      const ang = Math.random() * Math.PI * 2;\n      const r   = 60  + Math.random() * SPREAD;\n      const vx  = (Math.random() - 0.5) * 0.8;\n      const vy  = (Math.random() - 0.5) * 0.8;\n      const sx  = CX + Math.cos(ang) * r;\n      const sy  = CY + Math.sin(ang) * r;\n      return {\n        sx, sy,\n        endX: sx + vx * 30,\n        endY: sy + vy * 30,\n        targetX: t.x,\n        targetY: t.y,\n        vx, vy,\n        size:  0.8 + Math.random() * 1.5,\n        delay: Math.random() * 0.32,\n      };\n    });\n\n    const T0    = performance.now();\n    const DR    = 420;    // drift phase ms\n    const CV    = 1900;   // converge phase ms\n    const ST    = 340;    // settle/text fade ms\n    const TOTAL = DR + CV + ST;\n\n    const loop = (now) => {\n      if (this._particlesDone) return;\n      const el = now - T0;\n      ctx.clearRect(0, 0, W, H);\n\n      particles.forEach(p => {\n        const pe = el - p.delay * DR;\n        if (pe <= 0) return;\n\n        let px, py, alpha;\n\n        if (pe < DR) {\n          const dt = pe / DR;\n          px    = p.sx + p.vx * dt * 30;\n          py    = p.sy + p.vy * dt * 30;\n          alpha = Math.min(dt * 2.2, 0.62);\n          ctx.globalAlpha = alpha;\n          ctx.fillStyle   = '#6fa8e8';\n        } else {\n          const ct   = Math.min((pe - DR) / CV, 1);\n          const ease = 1 - Math.pow(1 - ct, 4); // quartic ease-out\n          px    = p.endX + (p.targetX - p.endX) * ease;\n          py    = p.endY + (p.targetY - p.endY) * ease;\n          alpha = 0.62 + ease * 0.38;\n          // Interpolate blue (#6fa8e8) → near-white (#e8eaf0)\n          const rr = Math.round(111 + (232 - 111) * ease);\n          const gg = Math.round(168 + (234 - 168) * ease);\n          const bb = Math.round(232 + (240 - 232) * ease);\n          ctx.globalAlpha = Math.min(alpha, 1);\n          ctx.fillStyle   = `rgb(${rr},${gg},${bb})`;\n        }\n\n        const sz = p.size * (pe < DR ? 1 : 1 + ((pe - DR) / CV) * 0.3);\n        ctx.beginPath();\n        ctx.arc(px, py, sz, 0, Math.PI * 2);\n        ctx.fill();\n      });\n\n      // Cross-fade crisp wordmark over settled dots\n      if (el > DR + CV) {\n        const t = Math.min((el - DR - CV) / ST, 1);\n        ctx.globalAlpha  = t;\n        ctx.fillStyle    = '#e8eaf0';\n        ctx.font         = `700 ${FS}px Charm`;\n        ctx.textAlign    = 'center';\n        ctx.textBaseline = 'middle';\n        ctx.fillText('ARIS', CX, CY);\n      }\n\n      if (el < TOTAL) {\n        this._rafId = requestAnimationFrame(loop);\n      } else {\n        ctx.clearRect(0, 0, W, H);\n        ctx.globalAlpha  = 1;\n        ctx.fillStyle    = '#e8eaf0';\n        ctx.font         = `700 ${FS}px Charm`;\n        ctx.textAlign    = 'center';\n        ctx.textBaseline = 'middle';\n        ctx.fillText('ARIS', CX, CY);\n        this._particlesDone = true;\n        this.setState({ animDone: true, taglineVisible: true });\n      }\n    };\n\n    this._rafId = requestAnimationFrame(loop);\n  }\n\n  // ─────────────────────────────────────────────────────────\n  // renderVals\n  // ─────────────────────────────────────────────────────────\n\n  renderVals() {\n    const { currentScreen, taglineVisible, entered } = this.state;\n\n    const dotColor = (i) => i === currentScreen ? '#6fa8e8' : 'rgba(255,255,255,0.2)';\n    const dotWidth = (i) => i === currentScreen ? '22px' : '6px';\n\n    return {\n      containerRef: this.containerRef,\n      canvasRef:    this.canvasRef,\n\n      // Nav handlers\n      goNext: () => this.navigate(1),\n      goPrev: () => this.navigate(-1),\n      skip:   () => this.jumpTo(4),\n      goTo0:  () => this.jumpTo(0),\n      goTo1:  () => this.jumpTo(1),\n      goTo2:  () => this.jumpTo(2),\n      goTo3:  () => this.jumpTo(3),\n      goTo4:  () => this.jumpTo(4),\n\n      // Visibility\n      showPrev: currentScreen > 0,\n      showNext: currentScreen < 4,\n      showSkip: currentScreen < 4,\n\n      // Tagline fade on screen 0\n      taglineOpacity: taglineVisible ? '1' : '0',\n\n      // Closing screen\n      handleEntrar: () => this.setState({ entered: true }),\n      comecarlabel:  entered ? 'Bem-vindo.' : 'Começar',\n      entrarBg:     entered ? '#0d2e56' : '#1a4a8a',\n\n      // Progress dots\n      d0w: dotWidth(0), d0c: dotColor(0),\n      d1w: dotWidth(1), d1c: dotColor(1),\n      d2w: dotWidth(2), d2c: dotColor(2),\n      d3w: dotWidth(3), d3c: dotColor(3),\n      d4w: dotWidth(4), d4c: dotColor(4),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"ARIS Onboarding.dc"}
